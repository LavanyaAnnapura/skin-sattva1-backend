services:
  - type: web
    name: skin-sattva-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT

databases:
  - name: skin-sattva-db
    plan: free
    databaseName: skin_sattva_db