services:
  - type: web
    name: skin-sattva-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: skin-sattva-db
    plan: free
    databaseName: skin_sattva_db